<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Cloud Resource Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='90' text-anchor='middle' dominant-baseline='central'>☁️</text></svg>">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://d3sdmrdkgkaitg.cloudfront.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://d3sdmrdkgkaitg.cloudfront.net https://dkifvm4b8a1j4.cloudfront.net https://cdnjs.cloudflare.com; connect-src 'self' https://ap-southeast-2zmuftlajo.auth.ap-southeast-2.amazoncognito.com https://cloud-resource-tracker.duckdns.org https://cognito-idp.ap-southeast-2.amazonaws.com; img-src 'self' https://d19nijclqkl93.cloudfront.net data:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; script-src-attr 'unsafe-hashes'; upgrade-insecure-requests;">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #1e293b, #0a0e17);
            min-height: 100vh;
            padding: 2rem;
        }

        .signup-card {
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="card signup-card">
        <div class="brand" style="justify-content: center; margin-bottom: 2rem; font-size: 2rem;">
            <i class="fas fa-cloud"></i> CloudTracker
        </div>
        <h2 style="text-align: center; margin-bottom: 0.5rem;">Create Account</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Join CloudTracker to monitor
            your assets</p>

        <div id="signup-error" class="auth-error"></div>

        <form id="signup-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
                    <button type="button" class="eye-btn" data-target="password" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0; font-size: 1rem;">👁</button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                    <button type="button" class="eye-btn" data-target="confirmPassword" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0; font-size: 1rem;">👁</button>
                </div>
            </div>
            <button type="submit" id="signup-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <span class="btn-text">Create Account</span>
                <span class="btn-spinner hidden" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
            Already have an account? <a href="index.html"
                style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Sign In</a>
        </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/amazon-cognito-identity-js/6.2.2/amazon-cognito-identity.min.js" crossorigin="anonymous"></script>
    <script src="js/auth.js"></script>
</body>

</html>
