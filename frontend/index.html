<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Cloud Resource Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='90' text-anchor='middle' dominant-baseline='central'>☁️</text></svg>">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://d3sdmrdkgkaitg.cloudfront.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://d3sdmrdkgkaitg.cloudfront.net https://dkifvm4b8a1j4.cloudfront.net https://cdnjs.cloudflare.com; connect-src 'self' https://ap-southeast-2zmuftlajo.auth.ap-southeast-2.amazoncognito.com https://cloud-resource-tracker.duckdns.org https://cognito-idp.ap-southeast-2.amazonaws.com; img-src 'self' https://d19nijclqkl93.cloudfront.net data:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; script-src-attr 'unsafe-hashes'; upgrade-insecure-requests;">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0a0e17);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 4rem;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hero-icon {
            font-size: 4rem;
            background: var(--gradient-1);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .btn-large {
            padding: 1.25rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 16px;
            margin-top: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="hero-icon">
            <i class="fas fa-cloud"></i>
        </div>

        <h1 style="font-size: 2.5rem; margin-bottom: 1rem; font-weight: 800; letter-spacing: -1px;">CloudTracker</h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem;">
            Professional multi-cloud resource monitoring and cost analysis platform.
        </p>

        <div id="signin-error" class="auth-error"></div>

        <form id="signin-form">
            <div class="form-group">
                <label for="signin-email">Email Address</label>
                <input type="email" id="signin-email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="signin-password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="signin-password" name="password" placeholder="••••••••" required>
                    <button type="button" class="eye-btn" data-target="signin-password" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0; font-size: 1rem;">👁</button>
                </div>
            </div>

            <button type="submit" id="signin-btn" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                <span class="btn-text">Sign In</span>
                <span class="btn-spinner hidden" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
            Don't have an account? <a href="signup.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Sign Up</a>
        </p>

        <p style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 1rem;">
            Powered by AWS Cognito Identity
        </p>

        <div style="margin-top: 3rem; display: flex; justify-content: center; gap: 2rem; font-size: 0.75rem; color: var(--text-secondary);">
            <span><i class="fas fa-shield-alt"></i> Secure</span>
            <span><i class="fas fa-bolt"></i> Real-time</span>
            <span><i class="fas fa-chart-pie"></i> Visualized</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/amazon-cognito-identity-js/6.2.2/amazon-cognito-identity.min.js" crossorigin="anonymous"></script>
    <script src="js/auth.js?v=4.0"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>

</html>
