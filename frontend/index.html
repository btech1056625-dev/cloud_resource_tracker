<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Cloud Resource Tracker</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://d3sdmrdkgkaitg.cloudfront.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' https://d3sdmrdkgkaitg.cloudfront.net https://dkifvm4b8a1j4.cloudfront.net https://cdnjs.cloudflare.com; connect-src 'self' https://ap-southeast-2zmuftlajo.auth.ap-southeast-2.amazoncognito.com https://cloud-resource-tracker.duckdns.org https://cognito-idp.ap-southeast-2.amazonaws.com; img-src 'self' https://d19nijclqkl93.cloudfront.net data:; font-src 'self' https: data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; script-src-attr 'none'; upgrade-insecure-requests;">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0a0e17);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 4rem;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hero-icon {
            font-size: 4rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .btn-large {
            padding: 1.25rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 16px;
            margin-top: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="hero-icon">
            <i class="fas fa-cloud"></i>
        </div>

        <h1 style="font-size: 2.5rem; margin-bottom: 1rem; font-weight: 800; letter-spacing: -1px;">CloudTracker</h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem;">
            Professional multi-cloud resource monitoring and cost analysis platform.
        </p>

        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <button onclick="login()" class="btn btn-primary btn-large">
                <i class="fas fa-sign-in-alt" style="margin-right: 0.5rem;"></i> Get Started
            </button>
            <p style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 1rem;">
                Powered by AWS Cognito Identity
            </p>
        </div>

        <div style="margin-top: 3rem; display: flex; justify-content: center; gap: 2rem; font-size: 0.75rem; color: var(--text-secondary);">
            <span><i class="fas fa-shield-alt"></i> Secure</span>
            <span><i class="fas fa-bolt"></i> Real-time</span>
            <span><i class="fas fa-chart-pie"></i> Visualized</span>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Auto-invoke authentication handler when page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Check if returning from Cognito with token in URL hash
            if (window.location.hash) {
                console.log("Cognito callback detected, processing authentication...");
                handleAuth();
            } else {
                // If already logged in, redirect to dashboard
                const token = localStorage.getItem("idToken");
                if (token) {
                    console.log("User already authenticated, redirecting to dashboard...");
                    window.location.href = "/dashboard.html";
                }
            }
        });
    </script>
</body>

</html>
