<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Cloud Resource Tracker</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0a0e17);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="card login-card">
        <div class="brand" style="justify-content: center; margin-bottom: 2rem; font-size: 2rem;">
            <i class="fas fa-cloud"></i> CloudTracker
        </div>

        <h2 style="text-align: center; margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
            Log in to manage your resources
        </p>

        <form onsubmit="event.preventDefault(); login(); return false;">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="admin@example.com" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required />
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0; cursor: pointer;">
                    <input type="checkbox" style="width: auto;" />
                    <span style="font-size: 0.75rem;">Remember me</span>
                </label>

                <a href="#" style="font-size: 0.75rem; color: var(--accent-blue); text-decoration: none;">
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
            Don't have an account?
            <a href="#" onclick="signup(); return false;" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">
                Sign Up
            </a>
        </p>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Check if user already logged in
        if (isAuthenticated()) {
            console.log("User already authenticated, redirecting to dashboard");
            window.location.href = "/dashboard.html";
        } else {
            // Handle Cognito redirect
            handleAuth();
        }
    </script>
</body>

</html>
